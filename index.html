<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keyy's Glow</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
background:#fdeff4;
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
background:white;
width:90%;
max-width:500px;
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h1{
font-family:'Playfair Display',serif;
font-size:42px;
margin-bottom:10px;
}

.subtitle{
color:#777;
}

.letter{
margin-top:25px;
background:#fff8fb;
padding:20px;
border-radius:18px;
text-align:left;
}

.letter h2{
text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h1>🌸 Keyy's Glow</h1>

<p class="subtitle">
Hola Melissa ✨
</p>

<div class="letter">

<h2>💌 Carta para ti</h2>

<p>
Querida Melissa,
</p>

<p>
Hoy quiero recordarte que cada pequeño paso cuenta.
No necesitas florecer de la noche a la mañana.
Las flores también crecen lentamente antes de mostrar toda su belleza.
</p>

<p>
Con cariño,<br>
Keyy's Glow 🌷
</p>

</div>

</div>

</body>
</html>
